<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>La Ghigliottina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #172445;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        header {
            background: linear-gradient(to bottom, #8b0000, #4a0000);
            border-bottom: 3px solid #000;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            position: relative;
        }
        
        header h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .btn-indietro {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid white;
            font-weight: bold;
        }

        .layout-gioco {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            justify-content: center;
        }

        .colonna-sinistra {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .colonna-destra {
            flex: 1.5;
            min-width: 350px;
            background: linear-gradient(to bottom, #8b0000, #4a0000);
            border: 3px solid #000;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .btn-blu, .indizio-svelato {
            background: linear-gradient(to bottom, #004b8d, #001a3b);
            border: 2px solid #000;
            color: white;
            padding: 15px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-blu {
            cursor: pointer;
        }

        .indizio-svelato {
            border-color: #d4a017;
            margin-bottom: 5px;
        }

        .box-scelta {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .box-scelta .btn-blu {
            flex: 1;
        }

        .montepremi-box {
            background: linear-gradient(to bottom, #d4a017, #8b6508);
            border: 2px solid #000;
            padding: 15px;
            font-size: 2.2em;
            font-weight: bold;
            border-radius: 6px;
            margin-top: 20px;
            color: white;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .filigrana-risposta {
            font-size: 3.5em;
            color: rgba(0, 0, 0, 0.2);
            font-weight: bold;
            font-style: italic;
            letter-spacing: 5px;
        }

        #fase-finale {
            display: none;
            width: 100%;
            text-align: center;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.8em;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #000;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn-conferma {
            background: linear-gradient(to bottom, #d4a017, #8b6508);
            border: 2px solid #000;
            color: white;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .messaggio-risultato {
            font-size: 2em;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>

        function inizializzaGioco() {
            var indiceCasuale = Math.floor(Math.random() * database.length);
            var partitaScelta = database[indiceCasuale];
            parolaFinale = partitaScelta.parolaFinale;
            passaggi = partitaScelta.passaggi;
            aggiornaInterfaccia();
        }

        function aggiornaInterfaccia() {
            // Utilizzo del codice \u20AC per generare il simbolo Euro in sicurezza
            document.getElementById('valore').innerText = montepremi + " \u20AC";
            
            if (stepCorrente < passaggi.length) {
                document.getElementById('btn-opzione1').innerText = passaggi[stepCorrente].opzioni[0];
                document.getElementById('btn-opzione2').innerText = passaggi[stepCorrente].opzioni[1];
            } else {
                document.getElementById('fase-scelta').style.display = 'none';
                document.getElementById('fase-attesa').style.display = 'none';
                document.getElementById('fase-finale').style.display = 'block';
            }
        }

        function seleziona(indiceScelta) {
            var parolaScelta = passaggi[stepCorrente].opzioni[indiceScelta];
            var parolaCorretta = passaggi[stepCorrente].corretta;

            if (parolaScelta !== parolaCorretta) {
                montepremi = Math.floor(montepremi / 2);
            }

            var divIndizio = document.createElement("div");
            divIndizio.className = "indizio-svelato";
            divIndizio.innerText = parolaCorretta;
            document.getElementById('lista-indizi').appendChild(divIndizio);

            stepCorrente++;
            aggiornaInterfaccia();
        }

        function verifica() {
            var risposta = document.getElementById('risposta').value.toLowerCase().trim();
            var messaggio = document.getElementById('messaggio');
            
            document.querySelector('.btn-conferma').disabled = true;

            if (risposta === parolaFinale.toLowerCase()) {
                messaggio.style.color = "#4CAF50"; 
                messaggio.innerText = "ESATTO! Hai Vinto " + montepremi + " \u20AC!";
            } else {
                messaggio.style.color = "#ffb3b3"; 
                messaggio.innerText = "SBAGLIATO! La parola era: " + parolaFinale.toUpperCase();
                document.getElementById('valore').innerText = "0 \u20AC";
            }
            
            // NUOVA RIGA INSERITA PER MOSTRARE IL PULSANTE
            document.getElementById('btn-gioca-ancora').style.display = 'block';
        }

        // NUOVA FUNZIONE INSERITA PER RESETTARE IL GIOCO
        function giocaAncora() {
            montepremi = 100000;
            stepCorrente = 0;
            
            // Svuota i box
            document.getElementById('lista-indizi').innerHTML = '';
            document.getElementById('risposta').value = '';
            document.getElementById('messaggio').innerText = '';
            
            // Nascondi fine gioco e ripristina la schermata iniziale
            document.getElementById('fase-finale').style.display = 'none';
            document.getElementById('fase-scelta').style.display = 'flex';
            document.getElementById('fase-attesa').style.display = 'block';
            
            // Ripristina i pulsanti
            document.querySelector('.btn-conferma').disabled = false;
            document.getElementById('btn-gioca-ancora').style.display = 'none';
            
            inizializzaGioco();
        }

        // Avvia il caricamento dei dati direttamente dal browser
        window.onload = inizializzaGioco;
    </script>
</body>
</html>
