<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight List</title>
    <style>
        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .header-row {
            display: flex;
            gap: 20px;
        }

        .box-categoria {
            flex: 2;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .box-categoria span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .box-categoria h2 {
            margin: 5px 0 0 0;
            font-size: 1.8em;
            text-transform: uppercase;
        }

        .box-stat {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .box-stat span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .timer-text {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff4b4b;
            text-shadow: 0 0 10px rgba(255, 75, 75, 0.5);
            margin-top: 5px;
        }

        .trovate-text {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .trovate-totale {
            font-size: 0.5em;
            color: rgba(255, 255, 255, 0.5);
        }

        .percentuale-text {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #ffd700;
            border-radius: 8px;
            padding: 15px;
            color: white;
            font-size: 1.2em;
            outline: none;
        }

        .btn-action {
            padding: 0 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-invia {
            background: #ffd700;
            color: #000;
        }

        .btn-pausa {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-fine {
            background: #dc3545;
            color: white;
        }

        .risposte-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 200px;
        }

        .risposte-box span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 15px;
        }

        .lista-pillole {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pillola {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .pillola-sbagliata {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #dc3545;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            text-decoration: line-through;
        }

        /* Schermata di Setup */
        #setup-screen {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #ffd700;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .setup-label {
            display: block;
            text-align: left;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        #setup-screen select, #setup-screen input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1.2em;
            background: white;
            color: black;
            box-sizing: border-box;
            cursor: pointer;
        }
        
        #btn-start {
            background: #ffd700;
            color: black;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
        }

        /* Modale di Fine Partita */
        #modal-fine {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .modal-liste-container {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-liste-container h3 {
            margin-top: 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        /* Stile per le parole non trovate nella lista finale */
        .modal-mancante {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="btn-home">← TORNA ALLA HOME</a>
        <div class="title">Fight List - Chi ne trova di più</div>
        <div style="width: 150px;"></div>
    </div>

    <div id="setup-screen">
        <h2 style="margin-top:0;">Imposta la Partita</h2>
        
        <label class="setup-label">Categoria</label>
        <select id="select-categoria"></select>
        
        <label class="setup-label">Tempo (in secondi)</label>
        <input type="number" id="input-timer" value="60" min="10" max="300">
        
        <button id="btn-start" onclick="avviaPartita()">Inizia a Giocare</button>
    </div>

    <div id="game-container" class="container">
        <div class="header-row">
            <div class="box-categoria">
                <span>CATEGORIA</span>
                <h2 id="titolo-categoria">Nome Categoria</h2>
            </div>
            <div class="box-stat">
                <span>TEMPO</span>
                <div class="timer-text" id="display-timer">00:00</div>
            </div>
            <div class="box-stat">
                <span>TROVATE</span>
                <div class="trovate-text"><span id="punteggio">0</span><span class="trovate-totale" id="totale-parole">/0</span></div>
                <div class="percentuale-text" id="percentuale-valore">0%</div>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="input-parola" placeholder="Scrivi una risposta..." onkeypress="gestisciInvio(event)">
            <button class="btn-action btn-invia" onclick="verificaParola()">✓ INVIA</button>
            <button class="btn-action btn-pausa" id="btn-pausa" onclick="pausaGioco()">II PAUSA</button>
            <button class="btn-action btn-fine" onclick="fineGioco()">◼ FINE</button>
        </div>

        <div class="risposte-box">
            <span>RISPOSTE TROVATE</span>
            <div class="lista-pillole" id="lista-trovate">
                </div>
        </div>
    </div>

    <div id="modal-fine">
        <div class="modal-content">
            <h2 id="modal-titolo" style="color: #ff4b4b; margin-top: 0; font-size: 2.5em;">TEMPO SCADUTO!</h2>
            <p id="modal-stats" style="font-size: 1.5em; font-weight: bold; color: #ffd700; margin-bottom: 20px;"></p>
            
            <div class="modal-liste-container">
                <h3>Tutte le parole della categoria</h3>
                <div id="modal-lista-completa" class="lista-pillole" style="justify-content: center;">
                    </div>
            </div>
            
            <button class="btn-action" style="margin-top: 30px; background: #ffd700; color: #000; padding: 15px 40px; font-size: 1.2em;" onclick="chiudiModalEResetta()">GIOCA ANCORA</button>
        </div>
    </div>

            "Sport Olimpici": ["Atletica leggera", "Nuoto", "Tuffi", "Nuoto artistico", "Pallanuoto", "Ginnastica artistica", "Ginnastica ritmica", "Trampolino elastico", "Ciclismo su pista", "Ciclismo su strada", "Mountain bike", "BMX", "Scherma", "Judo", "Taekwondo", "Lotta", "Pugilato", "Sollevamento pesi", "Canottaggio", "Canoa", "Kayak", "Vela", "Pallacanestro", "Pallavolo", "Beach Volley", "Calcio", "Pallamano", "Hockey su prato", "Rugby a 7", "Tennis", "Tennistavolo", "Badminton", "Golf", "Tiro con l'arco", "Tiro a segno", "Tiro a volo", "Pentathlon moderno", "Triathlon", "Equitazione", "Surf", "Skateboard", "Arrampicata sportiva", "Break dance", "Sci alpino", "Sci di fondo", "Salto con gli sci", "Combinata nordica", "Freestyle", "Snowboard", "Biathlon", "Pattinaggio di figura", "Pattinaggio di velocità", "Short track", "Bob", "Skeleton", "Slittino", "Hockey su ghiaccio", "Curling"]
        };

        let categoriaAttuale = "";
        let listaParoleDaIndovinare = [];
        let paroleIndovinate = [];
        let tempoRimanente = 0;
        let timerInterval;
        let inPausa = false;

        window.onload = function() {
            const select = document.getElementById("select-categoria");
            
            let opzioneCasuale = document.createElement("option");
            opzioneCasuale.value = "random";
            opzioneCasuale.text = "🎲 CATEGORIA CASUALE";
            select.appendChild(opzioneCasuale);

            for (let cat in database) {
                let option = document.createElement("option");
                option.value = cat;
                option.text = cat;
                select.appendChild(option);
            }
        };

        function avviaPartita() {
            let selectVal = document.getElementById("select-categoria").value;
            
            if (selectVal === "random") {
                let chiavi = Object.keys(database);
                categoriaAttuale = chiavi[Math.floor(Math.random() * chiavi.length)];
            } else {
                categoriaAttuale = selectVal;
            }

            tempoRimanente = parseInt(document.getElementById("input-timer").value);
            listaParoleDaIndovinare = database[categoriaAttuale];
            paroleIndovinate = [];

            document.getElementById("setup-screen").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            
            document.getElementById("titolo-categoria").innerText = categoriaAttuale;
            document.getElementById("totale-parole").innerText = "/" + listaParoleDaIndovinare.length;
            document.getElementById("punteggio").innerText = "0";
            document.getElementById("percentuale-valore").innerText = "0%";
            document.getElementById("lista-trovate").innerHTML = "";
            document.getElementById("input-parola").value = "";
            document.getElementById("input-parola").focus();

            aggiornaTimerDisplay();
            timerInterval = setInterval(gestisciTimer, 1000);
        }

        function gestisciTimer() {
            if (!inPausa) {
                tempoRimanente--;
                aggiornaTimerDisplay();
                if (tempoRimanente <= 0) {
                    fineGioco();
                }
            }
        }

        function aggiornaTimerDisplay() {
            let minuti = Math.floor(tempoRimanente / 60);
            let secondi = tempoRimanente % 60;
            document.getElementById("display-timer").innerText = 
                (minuti < 10 ? "0" : "") + minuti + ":" + (secondi < 10 ? "0" : "") + secondi;
        }

        function pausaGioco() {
            inPausa = !inPausa;
            let btnPausa = document.getElementById("btn-pausa");
            if (inPausa) {
                btnPausa.innerText = "▶ RIPRENDI";
                btnPausa.style.background = "#ffd700";
                btnPausa.style.color = "#000";
                document.getElementById("input-parola").disabled = true;
            } else {
                btnPausa.innerText = "II PAUSA";
                btnPausa.style.background = "rgba(255, 255, 255, 0.1)";
                btnPausa.style.color = "white";
                document.getElementById("input-parola").disabled = false;
                document.getElementById("input-parola").focus();
            }
        }

        function fineGioco() {
            clearInterval(timerInterval);
            document.getElementById("input-parola").disabled = true;
            
            let percFinale = Math.floor((paroleIndovinate.length / listaParoleDaIndovinare.length) * 100);
            
            // Popola le info generali
            document.getElementById("modal-stats").innerText = "Hai trovato " + paroleIndovinate.length + " parole su " + listaParoleDaIndovinare.length + " (" + percFinale + "%).";
            
            // Popola la lista unita (tutte le parole della categoria evidenziando quelle trovate)
            let htmlCompleto = "";
            listaParoleDaIndovinare.forEach(p => {
                if (paroleIndovinate.includes(p)) {
                    htmlCompleto += `<div class="pillola">✓ ${p}</div>`;
                } else {
                    htmlCompleto += `<div class="modal-mancante">${p}</div>`;
                }
            });
            document.getElementById("modal-lista-completa").innerHTML = htmlCompleto;

            // Mostra il modale che copre lo schermo e blocca l'utente qui finché non clicca "Gioca Ancora"
            document.getElementById("modal-fine").style.display = "flex";
        }

        function chiudiModalEResetta() {
            document.getElementById("modal-fine").style.display = "none";
            document.getElementById("setup-screen").style.display = "block";
            document.getElementById("game-container").style.display = "none";
            document.getElementById("input-parola").disabled = false;
        }

        function gestisciInvio(event) {
            if (event.key === "Enter") {
                verificaParola();
            }
        }

        function normalizza(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function calcolaDistanza(a, b) {
            if(a.length === 0) return b.length;
            if(b.length === 0) return a.length;
            var matrix = [];
            for(var i = 0; i <= b.length; i++){ matrix[i] = [i]; }
            for(var j = 0; j <= a.length; j++){ matrix[0][j] = j; }
            for(var i = 1; i <= b.length; i++){
                for(var j = 1; j <= a.length; j++){
                    if(b.charAt(i-1) == a.charAt(j-1)){
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function verificaParola() {
            let inputField = document.getElementById("input-parola");
            let testoOriginale = inputField.value.trim();
            let testoSritto = normalizza(testoOriginale);
            
            if (testoSritto === "") return;

            let trovata = false;

            for (let i = 0; i < listaParoleDaIndovinare.length; i++) {
                let parolaOriginale = listaParoleDaIndovinare[i];
                let parolaNormalizzata = normalizza(parolaOriginale);
                
                if (Math.abs(parolaNormalizzata.length - testoSritto.length) > 2) continue;

                let errori = calcolaDistanza(testoSritto, parolaNormalizzata);

                if (errori <= 2) {
                    trovata = true;
                    if (!paroleIndovinate.includes(parolaOriginale)) {
                        paroleIndovinate.push(parolaOriginale);
                        aggiungiPillola(parolaOriginale);
                        
                        document.getElementById("punteggio").innerText = paroleIndovinate.length;
                        let perc = Math.floor((paroleIndovinate.length / listaParoleDaIndovinare.length) * 100);
                        document.getElementById("percentuale-valore").innerText = perc + "%";
                    }
                    break;
                }
            }

            if (!trovata) {
                aggiungiPillolaSbagliata(testoOriginale);
            }

            inputField.value = "";
            inputField.focus();
        }

        function aggiungiPillola(testo) {
            let divPillola = document.createElement("div");
            divPillola.className = "pillola";
            divPillola.innerText = "✓ " + testo;
            
            let lista = document.getElementById("lista-trovate");
            lista.insertBefore(divPillola, lista.firstChild);
        }

        function aggiungiPillolaSbagliata(testo) {
            let divPillola = document.createElement("div");
            divPillola.className = "pillola-sbagliata";
            divPillola.innerText = "✗ " + testo;
            
            let lista = document.getElementById("lista-trovate");
            lista.insertBefore(divPillola, lista.firstChild);
        }
    </script>
</body>
